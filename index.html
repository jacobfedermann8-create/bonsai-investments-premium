<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BONSAI INVESTMENTS | Home</title>
    <style>
        :root { --bg-dark: #070708; --text-light: #f4f4f5; --accent: #c5a880; --muted-light: #a1a1aa; --border: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-light); }
        
        /* Header & Nav */
        header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 2rem 8rem; z-index: 100; backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .logo { font-size: 0.85rem; letter-spacing: 5px; text-transform: uppercase; color: var(--text-light); }
        .menu { display: flex; align-items: center; gap: 2.5rem; }
        nav a { color: var(--muted-light); text-decoration: none; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--accent); }
        
        /* Lang Switcher */
        .lang-btn { cursor: pointer; color: var(--accent); font-size: 0.7rem; letter-spacing: 2px; border: 1px solid var(--accent); padding: 4px 8px; }
        [lang="en"] .lang-fr, [lang="fr"] .lang-en { display: none; }

        /* Sections */
        section { padding: 8rem; border-top: 1px solid var(--border); }
        h2 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 4rem; }
        .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .card { border: 1px solid var(--border); padding: 2.5rem; transition: 0.4s; }
        .card:hover { border-color: var(--accent); }
        .card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .card p { color: var(--muted-light); font-size: 0.85rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">BONSAI INVESTMENTS.</div>
        <div class="menu">
            <nav>
                <a href="index.html">Home</a>
                <a href="team.html">Team</a>
                <a href="strategy.html">Strategy</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="lang-btn" onclick="toggleLang()">
                <span class="lang-fr">EN</span>
                <span class="lang-en">FR</span>
            </div>
        </div>
    </header>

    <main style="margin-top: 100px;">
        <!-- SECTION TEAM -->
        <section>
            <h2>Notre Équipe</h2>
            <div class="team-grid">
                <div class="card">
                    <h3>Jean Dupont</h3>
                    <p>Managing Partner</p>
                </div>
                <div class="card">
                    <h3>Sarah Martin</h3>
                    <p>Investment Principal</p>
                </div>
                <div class="card">
                    <h3>Alex Chen</h3>
                    <p>Growth Strategist</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        function toggleLang() {
            const html = document.documentElement;
            html.lang = (html.lang === 'fr') ? 'en' : 'fr';
        }
    </script>
</body>
</html>
