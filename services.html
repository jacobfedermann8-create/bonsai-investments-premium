<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Services | BONSAI INVESTMENTS SA</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">


<style>


:root{

--black:#050505;
--gold:#c6a46b;
--white:#f5f5f3;
--grey:#a5a5a5;

--sans:'Inter',sans-serif;
--serif:'Cormorant Garamond',serif;

}



*{

margin:0;
padding:0;
box-sizing:border-box;

}



html{

scroll-behavior:smooth;

}



body{

background:var(--black);

color:var(--white);

font-family:var(--sans);

overflow-x:hidden;

}




/* =====================
HEADER
===================== */


header{

position:fixed;

top:0;

left:0;

width:100%;

height:95px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 8%;

background:rgba(5,5,5,.75);

backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,.08);

z-index:1000;

}



.logo{

display:flex;

align-items:center;

gap:18px;

text-decoration:none;

}



.logo-mark{

width:50px;

height:50px;

border:1px solid var(--gold);

display:flex;

align-items:center;

justify-content:center;

}



.logo-mark svg{

width:36px;

height:36px;

}



.logo-mark svg path,
.logo-mark svg circle{

stroke:var(--gold);

stroke-width:3;

fill:none;

stroke-linecap:round;

}



.logo-mark .leaf{

fill:var(--gold);

stroke:none;

}



.logo-text{

font-size:14px;

letter-spacing:5px;

color:white;

font-weight:500;

}



nav a{

color:#aaa;

text-decoration:none;

font-size:12px;

letter-spacing:2px;

text-transform:uppercase;

margin-left:35px;

transition:.3s;

}



nav a:hover{

color:var(--gold);

}



/* BOUTON MOBILE */

.mobile-menu-btn{

display:none;

color:white;

font-size:28px;

cursor:pointer;

}



/* MENU MOBILE */

.mobile-menu{

display:none;

position:absolute;

top:95px;

left:0;

width:100%;

background:#050505;

padding:30px;

border-top:1px solid rgba(255,255,255,.08);

}



.mobile-menu a{

display:block;

color:white;

text-decoration:none;

font-size:14px;

letter-spacing:2px;

text-transform:uppercase;

padding:15px 0;

border-bottom:1px solid rgba(255,255,255,.08);

}



.mobile-menu.open{

display:block;

}




/* =====================
SERVICES HERO
===================== */


.services-hero{

height:90vh;

display:flex;

align-items:center;

padding:0 8%;


background:

linear-gradient(

90deg,

rgba(5,5,5,.96),

rgba(5,5,5,.55)

),


url("https://images.unsplash.com/photo-1556761175-b413da4baf72");


background-size:cover;

background-position:center;

}



.hero-content{

max-width:900px;

margin-top:80px;

}



.small-title{

color:var(--gold);

font-size:12px;

letter-spacing:5px;

text-transform:uppercase;

margin-bottom:30px;

}



.services-hero h1{

font-family:var(--serif);

font-size:75px;

font-weight:400;

line-height:1.1;

margin-bottom:35px;

}



.services-hero h1 em{

color:var(--gold);

font-style:italic;

}



.services-hero p{

max-width:700px;

font-size:18px;

line-height:1.9;

font-weight:300;

color:#c0c0c0;

}

/* =====================
SERVICES SECTION
===================== */


.section{

padding:120px 8%;

}



h2{

font-family:var(--serif);

font-size:55px;

font-weight:400;

line-height:1.2;

}



.service-grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:30px;

margin-top:60px;

}



.service-card{

padding:45px 35px;

border:1px solid rgba(255,255,255,.08);

background:rgba(255,255,255,.02);

transition:.4s;

}



.service-card:hover{

transform:translateY(-8px);

border-color:var(--gold);

}



.service-number{

font-family:var(--serif);

font-size:35px;

color:var(--gold);

margin-bottom:25px;

}



.service-card h3{

font-size:22px;

font-weight:400;

margin-bottom:20px;

}



.service-card p{

color:#999;

font-size:15px;

line-height:1.9;

}




/* =====================
APPROACH SECTION
===================== */


.approach{

padding:120px 8%;

background:#080808;

border-top:1px solid rgba(255,255,255,.08);

}



.approach-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:30px;

margin-top:60px;

}



.approach-card{

padding:45px 35px;

border-left:1px solid var(--gold);

background:rgba(255,255,255,.02);

}



.approach-card h3{

font-family:var(--serif);

font-size:38px;

font-weight:400;

margin-bottom:20px;

}



.approach-card p{

color:#999;

line-height:1.9;

font-size:15px;

}





/* =====================
CONFIDENTIALITY
===================== */


.confidentiality{

padding:120px 8%;

display:grid;

grid-template-columns:1fr 1fr;

gap:80px;

align-items:center;

}



.confidentiality-image{

height:450px;


background:

linear-gradient(

rgba(5,5,5,.25),

rgba(5,5,5,.65)

),


url("https://images.unsplash.com/photo-1560520653-9e0e4c89eb11");


background-size:cover;

background-position:center;

}



.confidentiality-text p{

color:#aaa;

font-size:17px;

line-height:2;

margin-top:30px;

}





/* =====================
WHY US
===================== */


.why{

padding:120px 8%;

background:#060606;

border-top:1px solid rgba(255,255,255,.08);

}



.why-grid{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:25px;

margin-top:60px;

}



.why-card{

padding:35px 25px;

border:1px solid rgba(255,255,255,.08);

}



.why-card h3{

font-family:var(--serif);

font-size:30px;

font-weight:400;

margin-bottom:20px;

}



.why-card p{

color:#999;

font-size:14px;

line-height:1.8;

}





/* =====================
FOOTER
===================== */


footer{

padding:65px 8%;

background:#030303;

border-top:1px solid rgba(255,255,255,.08);

display:flex;

justify-content:space-between;

align-items:center;

}



.footer-company{

font-size:14px;

letter-spacing:4px;

color:white;

margin-bottom:15px;

}



footer p{

color:#888;

font-size:12px;

line-height:2;

}



footer a{

color:#999;

font-size:12px;

text-decoration:none;

margin-left:30px;

}



footer a:hover{

color:var(--gold);

}

/* =====================
RESPONSIVE
===================== */


@media(max-width:1100px){


.service-grid{

grid-template-columns:1fr;

}



.approach-grid{

grid-template-columns:1fr;

}



.confidentiality{

grid-template-columns:1fr;

}



.why-grid{

grid-template-columns:repeat(2,1fr);

}



.services-hero h1{

font-size:55px;

}


}





@media(max-width:700px){


header{

height:80px;

padding:0 20px;

}



.logo{

gap:10px;

}



.logo-mark{

width:40px;

height:40px;

}



.logo-mark svg{

width:28px;

height:28px;

}



.logo-text{

font-size:10px;

letter-spacing:3px;

}



nav{

display:none;

}



.mobile-menu-btn{

display:block;

}



.mobile-menu{

top:80px;

}



.services-hero{

height:100vh;

padding:120px 25px 60px;

}



.hero-content{

margin-top:0;

}



.small-title{

font-size:10px;

letter-spacing:3px;

margin-bottom:25px;

}



.services-hero h1{

font-size:40px;

line-height:1.15;

margin-bottom:25px;

}



.services-hero p{

font-size:15px;

line-height:1.8;

}



.section,
.approach,
.confidentiality,
.why{

padding:80px 25px;

}



h2{

font-size:38px;

line-height:1.2;

}



.service-grid{

grid-template-columns:1fr;

gap:20px;

margin-top:40px;

}



.service-card{

padding:30px 25px;

}



.service-card h3{

font-size:20px;

}



.approach-grid{

grid-template-columns:1fr;

gap:20px;

}



.approach-card{

padding:30px 25px;

}



.approach-card h3{

font-size:32px;

}



.confidentiality-image{

height:330px;

margin-bottom:40px;

}



.confidentiality-text p{

font-size:15px;

line-height:1.8;

}



.why-grid{

grid-template-columns:1fr;

gap:20px;

}



.why-card{

padding:30px 25px;

}



footer{

padding:50px 25px;

flex-direction:column;

gap:30px;

text-align:center;

}



footer a{

display:block;

margin:15px 0;

}


}


</style>


</head>


<body>



<header>


<a href="index.html" class="logo">


<div class="logo-mark">


<svg viewBox="0 0 100 100">


<circle cx="50" cy="50" r="45"></circle>


<path d="M50 80 V42"></path>


<path d="M50 62 C35 55 25 60 30 45"></path>


<path d="M50 55 C65 48 75 40 72 28"></path>


<circle class="leaf" cx="30" cy="45" r="6"></circle>


<circle class="leaf" cx="72" cy="28" r="6"></circle>


<circle class="leaf" cx="50" cy="40" r="7"></circle>


</svg>


</div>


<div class="logo-text">

BONSAI INVESTMENTS SA

</div>


</a>



<nav>

<a href="index.html">Home</a>

<a href="about.html">About</a>

<a href="strategy.html">Strategy</a>

<a href="services.html">Services</a>

<a href="team.html">Team</a>

<a href="contact.html">Contact</a>

</nav>



<div class="mobile-menu-btn" onclick="openMenu()">

☰

</div>



<div class="mobile-menu">


<a href="index.html">Home</a>

<a href="about.html">About</a>

<a href="strategy.html">Strategy</a>

<a href="services.html">Services</a>

<a href="team.html">Team</a>

<a href="contact.html">Contact</a>


</div>


</header>



<script>


window.addEventListener("scroll",function(){


const header=document.querySelector("header");


if(window.scrollY>50){

header.style.background="rgba(5,5,5,.95)";

}else{

header.style.background="rgba(5,5,5,.75)";

}


});



function openMenu(){

document.querySelector(".mobile-menu").classList.toggle("open");

}


</script>



</body>

</html>
