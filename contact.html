<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BONSAI INVESTMENTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070708;
            --text-light: #f4f4f5;
            --accent: #c5a880;
            --muted-light: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-light); }

        /* --- HEADER & LOGO --- */
        header { position: fixed; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 8rem; z-index: 100; background: rgba(7, 7, 8, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .logo-container { display: flex; align-items: center; gap: 0.9rem; text-decoration: none; }
        .logo-icon { width: 32px; height: 32px; }
        .logo-text { font-size: 0.85rem; font-weight: 500; letter-spacing: 5px; text-transform: uppercase; color: var(--text-light); }
        .logo-text span { color: var(--accent); }
        nav a { color: var(--muted-light); text-decoration: none; margin-left: 2rem; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; transition: 0.4s; }
        nav a:hover, nav a.active { color: var(--accent); }

        /* --- CONTACT CONTENT --- */
        .contact-wrapper { padding: 14rem 8rem 8rem; display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: start; }
        h1 { font-family: 'Playfair Display', serif; font-size: 4rem; font-weight: 300; margin-bottom: 2rem; }
        .contact-info { margin-bottom: 3rem; }
        .contact-info h3 { color: var(--accent); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1rem; }
        .contact-info p { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text-light); }
        
        /* MAP STYLING */
        .map-container { width: 100%; height: 450px; border: 1px solid var(--border); background: #111; }
        iframe { width: 100%; height: 100%; border: none; filter: grayscale(1) invert(0.9) contrast(0.9); }

        footer { padding: 4rem 8rem; text-align: center; color: #333; font-size: 0.7rem; letter-spacing: 4px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="46" stroke="#c5a880" stroke-width="1.5" stroke-dasharray="2 2"/>
                <path d="M50 85 V45" stroke="#c5a880" stroke-width="3" stroke-linecap="round"/>
                <path d="M50 65 C40 60 30 65 32 50" stroke="#c5a880" stroke-width="2" stroke-linecap="round"/>
                <path d="M50 55 C60 50 70 55 68 40" stroke="#c5a880" stroke-width="2" stroke-linecap="round"/>
                <circle cx="32" cy="50" r="5" fill="#c5a880"/>
                <circle cx="68" cy="40" r="5" fill="#c5a880"/>
                <circle cx="50" cy="42" r="6" fill="#c5a880"/>
                <path d="M30 85 H70" stroke="#c5a880" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <div class="logo-text">BONSAI INVESTMENTS<span>.</span></div>
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="strategy.html">Strategy</a>
            <a href="services.html">Services</a>
            <a href="team.html">Team</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main class="contact-wrapper">
        <section>
            <h1>Contactez notre siège.</h1>
            <div class="contact-info">
                <h3>Adresse</h3>
                <p>Landoltstrasse 1</p>
                <p>8006 Zürich, Suisse</p>
            </div>
            <div class="contact-info">
                <h3>Registre du Commerce</h3>
                <p>CH-020.4.091.692-9</p>
            </div>
        </section>

        <section class="map-container">
            <!-- Intégration de la Google Map centrée sur Zurich -->
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2700.3284061806325!2d8.544719076679586!3d47.38206120894033!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x479aa0b637c35841%3A0x6a2c262141505c2a!2sLandoltstrasse%201%2C%208006%20Z%C3%BCrich%2C%20Suisse!5e0!3m2!1sfr!2sfr!4v1721053000000!5m2!1sfr!2sfr" allowfullscreen="" loading="lazy"></iframe>
        </section>
    </main>

    <footer>
        &copy; 2026 BONSAI INVESTMENTS — WEALTH MANAGEMENT & PRIVATE EQUITY
    </footer>
</body>
</html>
